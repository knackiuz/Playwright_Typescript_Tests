name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-jammy

    steps:
    - uses: actions/checkout@v4
    #- uses: actions/setup-node@v4
    #  with:
    #    node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      #run: npx playwright install --with-deps
      run: npx playwright install chromium

    - name: Run Playwright tests
      run: npx playwright test
      if: always() # Ensure that the tests run even if previous steps fail
    
    - name: Generate Allure Report
      uses: simple-elf/allure-report-action@master
      if: always() # Ensure that the report is generated even if tests fail
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages      
      if: always() # Ensure that the deployment runs even if report generation fails
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./allure-history

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
